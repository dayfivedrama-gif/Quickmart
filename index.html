<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pravin Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f7f9fc;
}

header {
  background: #2b7a78;
  color: white;
  padding: 15px;
  text-align: center;
}

header h1 { margin: 0; }
header p { margin: 5px 0; font-size: 14px; }

.filters {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
  background: white;
}

.filters button {
  padding: 8px 12px;
  border: none;
  background: #def2f1;
  border-radius: 20px;
  cursor: pointer;
}

.products {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card h4 { margin: 5px 0; }
.card p { font-size: 12px; }

.card button {
  width: 100%;
  padding: 8px;
  background: #3aafa9;
  color: white;
  border: none;
  border-radius: 5px;
}

.cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #17252a;
  color: white;
  padding: 15px;
  border-radius: 50%;
}

.cart-modal {
  position: fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:white;
  display:none;
  overflow:auto;
  padding:20px;
}

.cart-item {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.qty button {
  margin:0 5px;
}

.checkout {
  background:#2b7a78;
  color:white;
  padding:10px;
  width:100%;
  border:none;
}

.whatsapp {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: green;
  color: white;
  padding: 10px;
  border-radius: 50%;
}
</style>
</head>

<body>

<header>
<h1>Pravin Store</h1>
<p>Fresh groceries delivered to your door</p>
<p>Nawapara, CG | 📞 8959149089</p>
</header>

<div class="filters" id="filters"></div>
<div class="products" id="products"></div>

<div class="cart-btn" onclick="openCart()">🛒 <span id="count">0</span></div>
<a class="whatsapp" href="https://wa.me/918959149089">💬</a>

<div class="cart-modal" id="cartModal">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total">0</span></h3>

<button class="checkout" onclick="showForm()">Place Order</button>
<button onclick="closeCart()">Close</button>

<form id="orderForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" style="display:none;">
<input type="text" name="name" placeholder="Your Name" required><br>
<input type="tel" name="phone" placeholder="Phone Number" required><br>
<textarea name="address" placeholder="Address" required></textarea><br>
<textarea name="notes" placeholder="Instructions"></textarea>

<input type="hidden" name="order" id="orderData">

<button type="submit">Submit Order</button>
</form>

<p id="success" style="display:none;">✅ Order placed! We will contact you on WhatsApp.</p>
</div>

<script>

const products = [
{name:"Aashirvaad Atta",price:280,cat:"Groceries",img:"https://i.ibb.co/8r1ZzKQ/atta.jpg",desc:"Premium wheat flour"},
{name:"Amul Butter",price:280,cat:"Dairy",img:"https://i.ibb.co/6W7K9tK/butter.jpg",desc:"Fresh butter"},
{name:"Milk 1L",price:60,cat:"Dairy",img:"https://i.ibb.co/Gk6Zk8p/milk.jpg",desc:"Fresh milk"},
{name:"Maggi",price:14,cat:"Snacks",img:"https://i.ibb.co/WpM5yKZ/maggi.jpg",desc:"Instant noodles"},
{name:"Pepsi 1L",price:90,cat:"Beverages",img:"https://i.ibb.co/N7sH6Nt/pepsi.jpg",desc:"Cold drink"},
{name:"Biscuits",price:20,cat:"Snacks",img:"https://i.ibb.co/2sQh4Qx/biscuit.jpg",desc:"Crunchy biscuits"},
{name:"Rice 5kg",price:350,cat:"Groceries",img:"https://i.ibb.co/5nLr0Lg/rice.jpg",desc:"Premium rice"},
{name:"Sugar 1kg",price:45,cat:"Groceries",img:"https://i.ibb.co/qgKZ6Bp/sugar.jpg",desc:"Fine sugar"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || {};

function renderProducts(filter="All"){
const container = document.getElementById("products");
container.innerHTML="";

products.filter(p=>filter==="All"||p.cat===filter)
.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}" loading="lazy" alt="${p.name}">
<h4>${p.name}</h4>
<p>${p.desc}</p>
<b>₹${p.price}</b>
<button onclick="addToCart('${p.name}')">Add</button>
</div>`;
});
}

function renderFilters(){
let cats = ["All",...new Set(products.map(p=>p.cat))];
document.getElementById("filters").innerHTML=
cats.map(c=>`<button onclick="renderProducts('${c}')">${c}</button>`).join("");
}

function addToCart(name){
cart[name] = (cart[name]||0)+1;
saveCart();
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
let count=0,total=0,html="";
for(let name in cart){
let p = products.find(x=>x.name===name);
let qty = cart[name];
let subtotal = qty*p.price;
count+=qty;
total+=subtotal;

html+=`
<div class="cart-item">
${name} x ${qty} = ₹${subtotal}
<div class="qty">
<button onclick="changeQty('${name}',-1)">-</button>
<button onclick="changeQty('${name}',1)">+</button>
<button onclick="removeItem('${name}')">x</button>
</div>
</div>`;
}

document.getElementById("cartItems").innerHTML=html;
document.getElementById("count").innerText=count;
document.getElementById("total").innerText=total;
}

function changeQty(name,delta){
cart[name]+=delta;
if(cart[name]<=0) delete cart[name];
saveCart();
}

function removeItem(name){
delete cart[name];
saveCart();
}

function openCart(){document.getElementById("cartModal").style.display="block";}
function closeCart(){document.getElementById("cartModal").style.display="none";}

function showForm(){
document.getElementById("orderForm").style.display="block";

let summary="";
for(let name in cart){
let p = products.find(x=>x.name===name);
summary += `${name} x ${cart[name]} = ₹${cart[name]*p.price}\n`;
}
summary += "\nTotal: ₹"+document.getElementById("total").innerText;

document.getElementById("orderData").value = summary;
}

document.getElementById("orderForm").onsubmit = function(){
localStorage.removeItem("cart");
cart={};
updateCart();
document.getElementById("success").style.display="block";
};

renderFilters();
renderProducts();
updateCart();

</script>

</body>
</html>
